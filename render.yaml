services:
  - type: web
    name: lang-connect
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Render exposes port 8000 (HTTP); Nginx proxies /app to Reverb on 8080 internally
    port: 8000
    plan: starter
    region: singapore
    branch: main
    autoDeploy: true
    buildArgs:
      - key: VITE_REVERB_APP_KEY
        value: ${VITE_REVERB_APP_KEY}
      - key: VITE_REVERB_HOST
        value: ${VITE_REVERB_HOST}
      - key: VITE_REVERB_PORT
        value: "443"
      - key: VITE_REVERB_SCHEME
        value: "https"
    envVars:
      - key: APP_NAME
        value: LangConnect
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: REVERB_APP_ID
        sync: false
      - key: REVERB_APP_KEY
        sync: false
      - key: REVERB_APP_SECRET
        sync: false
      - key: REVERB_HOST
        sync: false
      - key: REVERB_PORT
        value: "443"
      - key: REVERB_SCHEME
        value: https
      - key: VITE_REVERB_APP_KEY
        sync: false
      - key: VITE_REVERB_HOST
        sync: false
      - key: VITE_REVERB_PORT
        value: "443"
      - key: VITE_REVERB_SCHEME
        value: https
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
